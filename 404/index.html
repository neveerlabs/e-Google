<!DOCTYPE html>
<html lang=en>
<head>
    <meta charset=utf-8>
    <meta name=viewport content="initial-scale=1, minimum-scale=1, width=device-width">
    <title>Error 404 (Not Found)</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M12 2 L2 22 L22 22 Z' fill='none' stroke='black' stroke-width='2' stroke-linejoin='round'/%3E%3Cline x1='12' y1='9' x2='12' y2='15' stroke='black' stroke-width='2' stroke-linecap='round'/%3E%3Ccircle cx='12' cy='19' r='1.5' fill='black'/%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0
        }

        html,code {
            font: 15px/22px arial,sans-serif
        }

        html {
            background: #fff;
            color: #222;
            padding: 15px
        }

        body {
            margin: 7% auto 0;
            max-width: 390px;
            min-height: 180px;
            padding: 30px 0 15px
        }

        * > body {
            background: url(robot.png) 100% 5px no-repeat;
            padding-right: 205px
        }

        p {
            margin: 11px 0 22px;
            overflow: hidden
        }

        ins {
            color: #777;
            text-decoration: none
        }

        a img {
            border: 0
        }

        @media screen and (max-width: 772px) {
            body {
                background:none;
                margin-top: 0;
                max-width: none;
                padding-right: 0
            }
        }

        #logo {
            background: url(//www.google.com/images/branding/googlelogo/1x/googlelogo_color_150x54dp.png) no-repeat;
            margin-left: -5px
        }

        @media only screen and (min-resolution: 192dpi) {
            #logo {
                background:url(//www.google.com/images/branding/googlelogo/2x/googlelogo_color_150x54dp.png) no-repeat 0% 0%/100% 100%;
                -moz-border-image: url(//www.google.com/images/branding/googlelogo/2x/googlelogo_color_150x54dp.png) 0
            }
        }

        @media only screen and (-webkit-min-device-pixel-ratio: 2) {
            #logo {
                background:url(//www.google.com/images/branding/googlelogo/2x/googlelogo_color_150x54dp.png) no-repeat;
                -webkit-background-size: 100% 100%
            }
        }

        #logo {
            display: inline-block;
            height: 54px;
            width: 150px
        }
    </style>
</head>
<body>
    <a href=//www.google.com/>
        <span id=logo aria-label=Google></span>
    </a>
    <p>
        <b>404.</b>
        <ins>That’s an error.</ins>
    </p>
    <p>
        The requested URL <code>/</code>
        was not found on this server.  <ins>That’s all we know.</ins>
    </p>
</body>
</html>
